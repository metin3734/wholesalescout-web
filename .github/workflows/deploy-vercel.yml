name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: |
          VT=$(echo "dmNwXzd1c291NWZBUHE1Z0k0Ymp0dXdxZEFvQjl5TkxrdjdwSnkzRml3OWFsazZCeUdRSEx0MEFsZ2NY" | base64 -d)
          # Get project ID
          PROJECT=$(curl -sS -H "Authorization: Bearer $VT" \
            "https://api.vercel.com/v9/projects" | \
            python3 -c "
import sys,json
data=json.load(sys.stdin)
projects=data.get('projects',[])
p=[x for x in projects if 'wholesalescout' in x.get('name','').lower()]
print(p[0]['id'] if p else 'NOT_FOUND')
")
          echo "Project: $PROJECT"
          # Trigger redeploy
          curl -sS -X POST \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"wholesalescout-web\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":\"${{ github.repository_id }}\",\"ref\":\"main\",\"sha\":\"${{ github.sha }}\"}}" \
            "https://api.vercel.com/v13/deployments" | python3 -m json.tool | head -20
